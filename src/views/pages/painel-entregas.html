<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Planet — Entregas</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div class="header-container painel-header">
    <div class="logo-painel hover-effect">
      <a href="/home"><img src="/img/Logo/Logo Branca.png" alt="Logo Pizza Planet"></a>
    </div>
    <nav>
      <ul>
        <li class="hover-effect"><a href="/meu-perfil" class="nav-perfil-link">Meu Perfil</a></li>
        <li id="nav-logout">
          <a href="#" class="btn-nav-borda" onclick="fazerLogout();return false" id="nav-nome">Sair</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<div class="entregas-wrapper">
  <h2 class="titulo-secao">Minhas Entregas</h2>
  <p class="entregas-subtitulo">Pedidos atribuídos a você com status "Saiu para Entrega"</p>
  <div id="lista-entregas"><p class="pedidos-vazio">Carregando...</p></div>
</div>

<!-- Modal detalhe -->
<div class="modal-overlay hidden" id="modal-detalhe">
  <div class="modal-box" style="max-width:540px">
    <button class="modal-fechar" onclick="fecharModal('modal-detalhe')">✕</button>
    <h3 id="detalhe-titulo">Pedido</h3>
    <div id="detalhe-corpo" class="modal-editar-corpo"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="/js/app.js"></script>
<script>
let _sessaoEntregador = null;

async function init() {
  const s = await carregarSessao();
  if (!s || s.perfil !== 'entregador') {
    window.location.href = '/home'; return;
  }
  _sessaoEntregador = s;
  carregarEntregas();
  setInterval(carregarEntregas, 20000);
}

async function carregarEntregas() {
  const res = await fetch('/api/pedidos');
  const pedidos = await res.json();

  if (!pedidos.length) {
    document.getElementById('lista-entregas').innerHTML =
      `<div class="entregas-vazio">
        <div class="icone">🛵</div>
        <p>Nenhuma entrega no momento.</p>
      </div>`;
    return;
  }

  document.getElementById('lista-entregas').innerHTML = pedidos.map(p => `
    <div class="entrega-card">
      <div class="entrega-card-topo" onclick="verDetalhe(${p.id})">
        <div class="cliente-data">
          <strong>${'#' + p.id} — ${p.cliente_nome}</strong>
          <p>${formatarData(p.criado_em)}</p>
        </div>
        <div class="entrega-card-valor">
          ${badgeStatus(p.status_atual)}
          <div class="valor">${formatarMoeda(p.valor_total)}</div>
        </div>
      </div>
      <div class="entrega-acoes">
        <button class="btn btn-sm btn-confirmar-pagamento" onclick="confirmarPagamento(${p.id})">💳 Confirmar Pagamento</button>
        <button class="btn btn-sm btn-confirmar-entrega" onclick="confirmarEntregue(${p.id})">✓ Confirmar Entrega</button>
      </div>
    </div>`).join('');
}

async function verDetalhe(id) {
  const res = await fetch(`/api/pedidos/${id}`);
  const p = await res.json();
  document.getElementById('detalhe-titulo').textContent = `Pedido #${p.id}`;

  const html = `
    <div class="detalhe-secao">
      <h4>📍 Endereço de Entrega</h4>
      <p><strong>${p.logradouro}, ${p.numero}</strong>${p.complemento ? ` — ${p.complemento}` : ''}</p>
      <p>${p.bairro}, ${p.cidade} — ${p.estado} · CEP ${p.cep}</p>
      ${p.ponto_referencia ? `<p>📌 ${p.ponto_referencia}</p>` : ''}
    </div>
    <div class="detalhe-secao">
      <h4>👤 Cliente</h4>
      <p><strong>${p.cliente_nome}</strong></p>
      <p>📞 ${p.cliente_telefone || 'Não informado'}</p>
    </div>
    <div class="detalhe-secao">
      <h4>💳 Pagamento</h4>
      <p><strong>${p.tipo_pagamento}</strong></p>
      ${p.observacao_pagamento ? (() => {
        const matchTroco = p.observacao_pagamento.match(/Troco para R\$\s*([\d,]+)/);
        if (matchTroco) {
          const valorCliente = parseFloat(matchTroco[1].replace(',','.'));
          const troco = valorCliente - parseFloat(p.valor_total);
          return `<p class="detalhe-pagamento-alerta">⚠️ ${p.observacao_pagamento}</p>
                  <p class="detalhe-troco-ok">💰 Devolver de troco: ${formatarMoeda(troco > 0 ? troco : 0)}</p>`;
        }
        return `<p class="detalhe-pagamento-alerta">⚠️ ${p.observacao_pagamento}</p>`;
      })() : ''}
    </div>
    <div class="detalhe-secao">
      <h4>🧾 Resumo</h4>
      ${(p.pizzas||[]).map(pi => `<p class="detalhe-item">🍕 ${pi.sabores.join(' + ')} — ${pi.tamanho_nome} · Qtd ${pi.quantidade}</p>`).join('')}
      ${(p.bebidas||[]).map(b => `<p class="detalhe-item">🥤 ${b.sabor} ${b.volume_ml}ml · Qtd ${b.quantidade}</p>`).join('')}
      <div class="detalhe-resumo-totais">
        <div class="detalhe-linha"><span>Subtotal</span><span>${formatarMoeda(p.valor_itens)}</span></div>
        <div class="detalhe-linha"><span>Frete</span><span>${formatarMoeda(p.valor_frete)}</span></div>
        <div class="detalhe-linha-total"><span>Total</span><span>${formatarMoeda(p.valor_total)}</span></div>
      </div>
    </div>`;

  document.getElementById('detalhe-corpo').innerHTML = html;
  document.getElementById('modal-detalhe').classList.remove('hidden');
}

async function confirmarPagamento(pedidoId) {
  const res = await fetch(`/api/pedidos/${pedidoId}/status`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ confirmarPagamento: true }),
  });
  const json = await res.json();
  if (res.ok) { toast('Pagamento confirmado!', 'sucesso'); carregarEntregas(); }
  else toast(json.erro || 'Erro ao confirmar pagamento.', 'erro');
}

async function confirmarEntregue(pedidoId) {
  const res = await fetch(`/api/pedidos/${pedidoId}/status`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ novoStatus: 'entregue' }),
  });
  const json = await res.json();
  if (res.ok) { toast('Entrega confirmada!', 'sucesso'); fecharModal('modal-detalhe'); carregarEntregas(); }
  else toast(json.erro || 'Erro ao confirmar entrega.', 'erro');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
