<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Planet — Pedidos</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <div class="header-container painel-header">
    <div class="logo-painel hover-effect">
      <a href="/home"><img src="/img/Logo/Logo Branca.png" alt="Logo Pizza Planet"></a>
    </div>
    <nav>
      <ul>
        <li class="hover-effect"><a href="/meu-perfil" class="nav-perfil-link">Meu Perfil</a></li>
        <li id="nav-logout">
          <a href="#" class="btn-nav-borda" onclick="fazerLogout();return false" id="nav-nome">Sair</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<div class="painel-layout">
  <aside class="painel-sidebar">
    <div class="sidebar-titulo">Painel</div>
    <a class="sidebar-link ativo" href="/painel/pedidos">
      <img class="sidebar-icone" src="/img/Icones/pedidos.png" alt=""> Pedidos
    </a>
    <a class="sidebar-link" href="/painel/cardapio" id="link-cardapio" style="display:none">
      <img class="sidebar-icone" src="/img/Icones/cardapio.png" alt=""> Cardápio
    </a>
    <a class="sidebar-link" href="/painel/clientes" id="link-clientes" style="display:none">
      <img class="sidebar-icone" src="/img/Icones/clientes.png" alt=""> Clientes
    </a>
    <a class="sidebar-link" href="/painel/funcionarios" id="link-funcionarios" style="display:none">
      <img class="sidebar-icone" src="/img/Icones/funcionarios.png" alt=""> Funcionários
    </a>
  </aside>

  <main class="painel-conteudo">
    <h2 class="titulo-secao" style="margin-bottom:1.5rem">Pedidos</h2>
    <div class="filtros">
      <button class="filtro-btn ativo" onclick="filtrar(this,'')">Todos</button>
      <button class="filtro-btn" onclick="filtrar(this,'aguardando_pagamento')">Aguardando</button>
      <button class="filtro-btn" onclick="filtrar(this,'em_producao')">Em Produção</button>
      <button class="filtro-btn" onclick="filtrar(this,'saiu_para_entrega')">Saiu p/ Entrega</button>
      <button class="filtro-btn" onclick="filtrar(this,'entregue')">Entregues</button>
      <button class="filtro-btn" onclick="filtrar(this,'cancelado')">Cancelados</button>
    </div>
    <div id="tabela-pedidos"><p class="pedidos-vazio">Carregando...</p></div>
  </main>
</div>

<div class="modal-overlay hidden" id="modal-acao">
  <div class="modal-box" style="max-width:580px">
    <button class="modal-fechar" onclick="fecharModal('modal-acao')">✕</button>
    <h3 id="modal-acao-titulo">Pedido</h3>
    <div id="modal-acao-corpo" class="modal-editar-corpo"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<script src="/js/app.js"></script>
<script>
let statusFiltro = '';
let entregadoresList = [];

async function init() {
  const s = await carregarSessao();
  if (!s || s.perfil !== 'funcionario') { window.location.href = '/home'; return; }
  if (s.roles.includes('cardapio') || s.roles.includes('admin'))
    document.getElementById('link-cardapio').style.display = '';
  if (s.roles.includes('admin')) {
    document.getElementById('link-clientes').style.display = '';
    document.getElementById('link-funcionarios').style.display = '';
  }
  entregadoresList = await (await fetch('/api/pedidos/entregadores')).json();
  carregarPedidos();
  setInterval(carregarPedidos, 30000);
}

async function carregarPedidos() {
  const url = '/api/pedidos' + (statusFiltro ? `?status=${statusFiltro}` : '');
  const res = await fetch(url);
  const pedidos = await res.json();
  renderizarTabela(pedidos);
}

function filtrar(btn, status) {
  statusFiltro = status;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  carregarPedidos();
}

function renderizarTabela(pedidos) {
  if (!pedidos.length) {
    document.getElementById('tabela-pedidos').innerHTML = '<p class="pedidos-vazio">Nenhum pedido encontrado.</p>';
    return;
  }
  document.getElementById('tabela-pedidos').innerHTML = `
    <table class="tabela">
      <thead><tr>
        <th>#</th><th>Cliente</th><th>Data</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Ações</th>
      </tr></thead>
      <tbody>
        ${pedidos.map(p => `<tr>
          <td><strong>#${p.id}</strong></td>
          <td>${p.cliente_nome}</td>
          <td>${formatarData(p.criado_em)}</td>
          <td>${formatarMoeda(p.valor_total)}</td>
          <td><span class="badge ${p.status_pagamento==='pago'?'badge-pago':'badge-pendente'}">${p.status_pagamento}</span></td>
          <td>${badgeStatus(p.status_atual)}</td>
          <td class="td-acoes">
            <button class="btn btn-outline btn-sm" onclick="verPedido(${p.id})">Ver</button>
            ${botoesAcao(p)}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function botoesAcao(p) {
  const s = p.status_atual;
  if (s === 'aguardando_pagamento')
    return `<button class="btn btn-sm btn-aceitar" onclick="atualizarStatus(${p.id},'em_producao')">✓ Aceitar</button>
            <button class="btn btn-sm btn-recusar" onclick="abrirCancelamento(${p.id})">✕ Recusar</button>`;
  if (s === 'em_producao')
    return `<button class="btn btn-sm btn-despachar" onclick="abrirDespacho(${p.id})">🛵 Despachar</button>`;
  if (s === 'saiu_para_entrega')
    return `<span class="status-aguardando-entregador">Aguardando confirmação do entregador</span>`;
  return '';
}

async function verPedido(id) {
  const res = await fetch(`/api/pedidos/${id}`);
  const p = await res.json();
  document.getElementById('modal-acao-titulo').textContent = `Pedido #${p.id}`;
  let html = `<p class="pedido-ver-header"><strong>${p.cliente_nome}</strong> · ${p.cliente_telefone || '—'}</p>
    <p class="pedido-ver-header">${p.logradouro}, ${p.numero} — ${p.bairro}, ${p.cidade}</p>
    ${p.ponto_referencia ? `<p class="pedido-ver-ref">Ref: ${p.ponto_referencia}</p>` : ''}
    <p class="pedido-ver-pagamento">Pagamento: <strong>${p.tipo_pagamento}</strong>${p.observacao_pagamento ? ` · <span class="pedido-ver-obs">${p.observacao_pagamento}</span>` : ''}</p>
    <hr class="pedido-ver-hr"><h4 class="pedido-ver-historico-titulo">Itens</h4>`;
  p.pizzas?.forEach(pi => {
    html += `<p class="pedido-ver-item">🍕 ${pi.sabores.join(' + ')} — ${pi.tamanho_nome}${pi.borda_nome ? ` · Borda ${pi.borda_nome}` : ''} · Qtd ${pi.quantidade} · <strong>${formatarMoeda((Number(pi.valor_unitario)+Number(pi.valor_borda||0))*pi.quantidade)}</strong></p>`;
  });
  p.bebidas?.forEach(b => {
    html += `<p class="pedido-ver-item">🥤 ${b.sabor} ${b.volume_ml}ml · Qtd ${b.quantidade} · <strong>${formatarMoeda(b.valor_unitario*b.quantidade)}</strong></p>`;
  });
  html += `<div class="pedido-totais">
    <div class="pedido-total-linha"><span>Subtotal</span><span>${formatarMoeda(p.valor_itens)}</span></div>
    <div class="pedido-total-frete"><span>Frete</span><span>${formatarMoeda(p.valor_frete)}</span></div>
    <div class="pedido-total-final"><span>Total</span><span>${formatarMoeda(p.valor_total)}</span></div>
  </div>
    <hr class="pedido-ver-hr"><h4 class="pedido-ver-historico-titulo">Histórico</h4>`;
  p.historico?.forEach(h => {
    html += `<p class="historico-linha">${formatarData(h.alterado_em)} — ${badgeStatus(h.status)}${h.funcionario_nome ? ` <small class="historico-autor">por ${h.funcionario_nome}</small>` : ''}</p>`;
  });
  document.getElementById('modal-acao-corpo').innerHTML = html;
  document.getElementById('modal-acao').classList.remove('hidden');
}

function abrirDespacho(pedidoId) {
  const opts = entregadoresList.map(e => `<option value="${e.entregador_id}">${e.nome} — ${e.placa_veiculo}</option>`).join('');
  document.getElementById('modal-acao-titulo').textContent = 'Despachar Pedido';
  document.getElementById('modal-acao-corpo').innerHTML = `
    <div class="form-group"><label>Selecione o entregador</label>
      <select class="form-control" id="sel-entregador">${opts}</select></div>
    <div class="form-group"><label>Observação (opcional)</label>
      <input class="form-control" id="obs-despacho" placeholder="Ex: troco para R$100"></div>
    <button class="btn btn-amarelo btn-block" onclick="confirmarDespacho(${pedidoId})">CONFIRMAR DESPACHO</button>`;
  document.getElementById('modal-acao').classList.remove('hidden');
}

async function confirmarDespacho(pedidoId) {
  const entregadorId = parseInt(document.getElementById('sel-entregador').value);
  const observacao   = document.getElementById('obs-despacho').value;
  await enviarStatus(pedidoId, 'saiu_para_entrega', { entregadorId, observacao });
}

async function atualizarStatus(pedidoId, novoStatus, extra = {}) {
  await enviarStatus(pedidoId, novoStatus, extra);
}

async function enviarStatus(pedidoId, novoStatus, extra = {}) {
  const res = await fetch(`/api/pedidos/${pedidoId}/status`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ novoStatus, ...extra }),
  });
  const json = await res.json();
  if (!res.ok) { toast(json.erro || 'Erro ao atualizar status.', 'erro'); return; }
  toast('Status atualizado!', 'sucesso');
  fecharModal('modal-acao');
  carregarPedidos();
}

function abrirCancelamento(pedidoId) {
  document.getElementById('modal-acao-titulo').textContent = 'Cancelar Pedido';
  document.getElementById('modal-acao-corpo').innerHTML = `
    <p class="cancelamento-aviso">Informe o motivo do cancelamento. O cliente poderá visualizar essa mensagem.</p>
    <div class="form-group">
      <label>Motivo do cancelamento *</label>
      <textarea class="form-control" id="motivo-cancelamento" rows="3" placeholder="Ex: Ingrediente indisponível, fora da área de entrega..."></textarea>
    </div>
    <button class="btn-confirmar-cancelamento" onclick="confirmarCancelamento(${pedidoId})">CONFIRMAR CANCELAMENTO</button>`;
  document.getElementById('modal-acao').classList.remove('hidden');
}

async function confirmarCancelamento(pedidoId) {
  const motivo = document.getElementById('motivo-cancelamento').value.trim();
  if (!motivo) { toast('Informe o motivo do cancelamento.', 'erro'); return; }
  await enviarStatus(pedidoId, 'cancelado', { observacao: motivo });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
